<div class="custom-calc-card">
    <div class="card-badge-header badge-green">
        <i class="bi bi-calculator-fill"></i> CALCULATION RESULT
    </div>

    <div class="pt-4">
        <!-- Panel Pricing -->
        <div class="result-list-item">
            <div class="d-flex align-items-center gap-3">
                <div class="icon-box icon-box-green"><i class="bi bi-grid-3x3-gap-fill"></i></div>
                <span>Panel Price</span>
            </div>
            <strong id="panel_price">Rs. 0</strong>
        </div>

        <!-- Frame Pricing -->
        <div class="result-list-item">
            <div class="d-flex align-items-center gap-3">
                <div class="icon-box icon-box-green"><i class="bi bi-layout-three-columns"></i></div>
                <span>Frame Price</span>
            </div>
            <strong id="frame_price">Rs. 0</strong>
        </div>

        <!-- Equipment Pricing -->
        <div class="result-list-item">
            <div class="d-flex align-items-center gap-3">
                <div class="icon-box icon-box-green"><i class="bi bi-wrench-adjustable"></i></div>
                <span>Equipment</span>
            </div>
            <strong id="equipment_price">Rs. 0</strong>
        </div>

        <!-- Inverter Pricing -->
        <div class="result-list-item">
            <div class="d-flex align-items-center gap-3">
                <div class="icon-box icon-box-green"><i class="bi bi-cpu-fill"></i></div>
                <span>Inverter</span>
            </div>
            <strong id="inverter_price">Rs. 0</strong>
        </div>

        <!-- Labour Cost -->
        <div class="result-list-item">
            <div class="d-flex align-items-center gap-3">
                <div class="icon-box icon-box-green"><i class="bi bi-person-fill-gear"></i></div>
                <span>Labour</span>
            </div>
            <strong id="labour_price">Rs. 0</strong>
        </div>

        <!-- Highlighted Grand Total Row Box -->
        <div class="grand-total-container">
            <span class="grand-total-title">Grand Total</span>
            <div class="grand-total-badge" id="grand_total">Rs. 0</div>
        </div>

        <!-- Lower Section Installments Blocks Structure -->
        <div class="installment-section">
            <div class="result-list-item">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-calendar3 text-success"></i>
                    <span>12 Month Total</span>
                </div>
                <strong id="installment_total">Rs. 0</strong>
            </div>

            <div class="result-list-item">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-wallet2 text-success"></i>
                    <span>First Month</span>
                </div>
                <strong id="first_month_payment">Rs. 0</strong>
            </div>

            <div class="result-list-item">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-clock-history text-success"></i>
                    <span>Remaining 11 Months</span>
                </div>
                <strong id="monthly_payment">Rs. 0</strong>
            </div>
        </div>
    </div>
</div>
