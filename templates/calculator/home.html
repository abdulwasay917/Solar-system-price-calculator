{% extends "base.html" %}
{% load static %}

{% block title %}Solar Calculator{% endblock %}

{% block content %}
<div class="row g-4">
    <!-- Left Input Elements Form Side -->
    <div class="col-lg-7">
        <div class="custom-calc-card">
            <div class="card-badge-header badge-blue">
                <i class="bi bi-gear-fill"></i> SOLAR INFORMATION
            </div>

            <div class="pt-4">
                <!-- Row 1: Number of Panels -->
                <div class="input-group-custom">
                    <div class="icon-box"><i class="bi bi-grid-3x3-gap-fill"></i></div>
                    <label for="panel_quantity">Number of Panels</label>
                    <input id="panel_quantity" type="number" class="form-control" placeholder="0">
                </div>

                <!-- Row 2: Panel Watt -->
                <div class="input-group-custom">
                    <div class="icon-box"><i class="bi bi-lightning-charge-fill"></i></div>
                    <label for="panel_watt">Panel Watt</label>
                    <select id="panel_watt" class="form-select">
                        <option value="585">585W</option>
                        <option value="600">600W</option>
                        <option value="615">615W</option>
                        <option value="665">665W</option>
                        <option value="710">710W</option>
                    </select>
                </div>

                <!-- Row 3: Number of Frames -->
                <div class="input-group-custom">
                    <div class="icon-box"><i class="bi bi-tools"></i></div>
                    <label for="frame_quantity">Number of Frames</label>
                    <input id="frame_quantity" type="number" class="form-control" placeholder="0">
                </div>

                <!-- Row 4: Inverter Company -->
                <div class="input-group-custom">
                    <div class="icon-box"><i class="bi bi-box-seam-fill"></i></div>
                    <label for="company">Inverter Company</label>
                    <select id="company" class="form-select">
                        <option value="None">None</option>
                        <option value="Desi">Desi</option>
                        <option value="Galaxy">Galaxy</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                </div>

                <!-- Row 5: Capacity Container -->
                <div class="input-group-custom" id="capacityDiv">
                    <div class="icon-box"><i class="bi bi-speedometer"></i></div>
                    <label for="capacity">Capacity</label>
                    <select id="capacity" class="form-select">
                        <option value="8">8 kW</option>
                        <option value="10">10 kW</option>
                    </select>
                </div>

                <!-- Reset Button Component -->
                <button class="btn btn-reset-custom w-100 mt-4" id="reset">
                    <i class="bi bi-arrow-counterclockwise"></i> RESET CALCULATOR
                </button>
            </div>
        </div>
    </div>

    <!-- Right Result Card Outputs Side -->
    <div class="col-lg-5">
        {% include "calculator/result_card.html" %}
    </div>
</div>
{% endblock %}

{% block js %}
<script src="{% static 'js/calculator.js' %}"></script>
{% endblock %}
