<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ijarah Corporation{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Custom inline style just for your brand images -->
    <style>
        .header-banner {
            background-image: linear-gradient(to right, rgba(255,255,255,1) 40%, rgba(255,255,255,0.7) 70%, rgba(255,255,255,0.2) 100%),
                              url("{% static 'images/solar_bg.jpg' %}");
            background-size: cover;
            background-position: right center;
            background-repeat: no-repeat;
            border-radius: 0 0 24px 24px;
            box-shadow: 0 4px 20px rgba(10, 61, 130, 0.05);
        }
        .brand-logo-img {
            max-height: 55px;
            width: auto;
            object-fit: contain;
        }
    </style>
    {% block css %}{% endblock %}
</head>
<body>

<!-- Upper Header Layout with Logo and Background Image -->
<div class="header-banner py-4">
    <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between text-center text-md-start gap-3">
        <div class="d-flex align-items-center gap-3">
            <!-- Dynamic Company Logo Image -->
            <img src="{% static 'images/logo.png' %}" alt="Ijarah Corporation Logo" class="brand-logo-img">
            <div>
                <h2 class="fw-bold m-0" style="color: var(--primary-blue); letter-spacing: -0.5px;">Ijarah Corporation</h2>
                <small class="text-muted fw-medium">Solar Solutions for a Sustainable Future</small>
            </div>
        </div>
        <div class="brand-divider d-none d-md-block"></div>
        <div class="flex-grow-1 ps-md-3">
            <h3 class="fw-bold m-0" style="color: var(--primary-blue);">Solar Calculator</h3>
            <small class="text-muted fw-medium">Calculate your Solar System Cost & Installment Plan</small>
        </div>
    </div>
</div>

<div class="container py-4">
    {% block content %}{% endblock %}
</div>

{% include "calculator/footer.html" %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block js %}{% endblock %}
</body>
</html>
